{% extends "base.html" %}

{% block title %}✨ Bingo Musical — Felices 24, {{ nombre_cumple }}! 💜{% endblock %}

{% block content %}
<div class="hero">

  <!-- Imagen hero con fallback SVG -->
  <div class="hero-imagen-wrap">
    <img
      src="{{ url_for('static', filename='hero.jpg') }}"
      alt=""
      class="hero-imagen"
      style="display:none"
      onload="this.style.display='block'; document.getElementById('hero-fallback').style.display='none'">
    <div id="hero-fallback" class="hero-imagen-fallback">
      <svg viewBox="0 0 400 180" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;border-radius:16px">
        <defs>
          <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#4a0080"/>
            <stop offset="40%" style="stop-color:#1a0533"/>
            <stop offset="100%" style="stop-color:#0d1b3e"/>
          </linearGradient>
        </defs>
        <rect width="400" height="180" fill="url(#hg)"/>
        <!-- Luces de escenario -->
        <circle cx="80"  cy="20"  r="60" fill="rgba(233,30,140,0.15)"/>
        <circle cx="200" cy="10"  r="80" fill="rgba(155,89,182,0.12)"/>
        <circle cx="320" cy="20"  r="60" fill="rgba(212,168,83,0.15)"/>
        <!-- Sparkles -->
        <text x="50"  y="100" font-size="28" fill="rgba(240,192,64,0.9)">✨</text>
        <text x="160" y="80"  font-size="36" fill="rgba(244,194,215,0.9)">💜</text>
        <text x="250" y="110" font-size="28" fill="rgba(240,192,64,0.9)">🎤</text>
        <text x="330" y="75"  font-size="24" fill="rgba(244,194,215,0.8)">🦋</text>
        <text x="110" y="150" font-size="20" fill="rgba(212,168,83,0.7)">⭐</text>
        <text x="290" y="155" font-size="20" fill="rgba(244,194,215,0.7)">✨</text>
      </svg>
    </div>
  </div>

  <h1 class="titulo-principal">✨ Bingo Musical ✨</h1>
  <p class="subtitulo-cumple">Felices 24, {{ nombre_cumple }} 🎂💜</p>
  <p class="tagline">Psicóloga en proceso 🧠 · Swiftie de corazón 💜</p>

  <div class="form-registro">
    <form action="/register" method="POST" autocomplete="off">
      <label for="nombre">¿Cuál es tu nombre?</label>
      <input
        type="text"
        id="nombre"
        name="nombre"
        placeholder="Escribí tu nombre..."
        required
        autofocus
        maxlength="30"
        autocomplete="off">
      <button type="submit" class="btn-primary">
        Entrar al juego 🎵
      </button>
    </form>
    <p class="hint-texto">Si ya entraste antes, volvés a tu mismo cartón ✨</p>
  </div>

</div>
{% endblock %}
